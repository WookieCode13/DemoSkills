proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection "";

upstream employeeapi {
    server employeeapi:8080;
}

upstream companyapi {
    server companyapi:8081;
}

upstream payapi {
    server payapi:8082;
}

upstream taxcalculatorapi {
    server taxcalculatorapi:8083;
}

upstream reportapi {
    server reportapi:8084;
}

upstream dashboard {
    server dashboard:80;
}

upstream dozzle {
    server dozzle:8080;
}

server {
    listen 80;
    server_name longranch.com longranch.wookie;

    location / {
        proxy_pass http://dashboard;
    }
}

server {
    listen 80;
    server_name employee.longranch.com employee.longranch.wookie;

    location / {
        proxy_pass http://employeeapi;
    }
}

server {
    listen 80;
    server_name company.longranch.com company.longranch.wookie;

    location / {
        proxy_pass http://companyapi;
    }
}

server {
    listen 80;
    server_name pay.longranch.com pay.longranch.wookie;

    location / {
        proxy_pass http://payapi;
    }
}

server {
    listen 80;
    server_name tax.longranch.com tax.longranch.wookie;

    location / {
        proxy_pass http://taxcalculatorapi;
    }
}

server {
    listen 80;
    server_name report.longranch.com report.longranch.wookie;

    location / {
        proxy_pass http://reportapi;
    }
}

server {
    listen 80;
    server_name dozzle.longranch.com dozzle.longranch.wookie;

    location / {
        proxy_pass http://dozzle;
    }
}
