# Using the the online Harenss UI, the work is don on my linux box with a local docker delegate.
# YAML pipeline definition for building and pushing Docker images using the Harness Docker delegate
# The multi-stage approach but with local delegate using docker runtime instead of cloud CI.
# No Hareness credits used, a little faster then single stage. A lot faster then multi-stage cloud CI.
# IMPORTANT: run locally > sudo -E ./harness-docker-runner-linux-amd64 server (keep running in background).
# ALSO: CI-LITE-ENGINE is NOT needed on local machine. MUST install the Harness exe.
pipeline:
  name: DS - Build w Docker Delegate
  identifier: DS_Build_w_Docker_Delegate
  projectIdentifier: demo_skills_project
  orgIdentifier: default
  description: A pipeline that will use the Harness docker delegate.
  tags: {}

  properties:
    ci:
      codebase:
        connectorRef: git_proj_demoskills
        build: <+input>

  variables:
    - name: SERVICE_NAME
      type: String
      value: <+input>.allowedValues(EmployeeAPI,CompanyAPI,TaxCalculatorAPI,PayAPI,ReportAPI,Dashboard,All)
      description: Choose the API to build (Dashboard = static UI).
      required: true
    - name: TARGET_ENV
      type: String
      value: <+input>.allowedValues(Development,Production)
      description: Target environment (used to drive ASPNETCORE_ENVIRONMENT and secrets in downstream steps)
      required: true
    - name: PERFORM_TESTS
      type: String
      value: <+input>.allowedValues("Yes","No")
      description: Run unit tests? Yes to run, No to skip
      required: true
      default: "Yes"

  stages:
    # -------------------- STAGE 1: SETUP (generate tag) --------------------
    - stage:
        name: setup
        identifier: setup
        type: CI
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.SERVICE_NAME> != "All"
        delegateSelectors:
          - harness-docker-delegate-demoskills
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              connectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: Generate Image Name
                  identifier: GENERATE_IMAGE_NAME
                  spec:
                    shell: Sh
                    outputVariables:
                      - name: IMAGE_TAG
                      - name: BUILD_REF
                    command: |
                      SERVICE_NAME="<+pipeline.variables.SERVICE_NAME>"
                      GIT_SPEC_TAG="<+pipeline.properties.ci.codebase.build.spec.tag>"
                      GIT_TAG="<+codebase.gitTag>"
                      BRANCH="<+codebase.branch>"

                      SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-') 
                      CLEAN_BRANCH=$(echo "$SAFE_BRANCH" | sed 's/^feature-//')

                      pick_first() {
                        for val in "$@"; do
                          if [ -n "$val" ] && [ "$val" != "null" ] && [ "$val" != "'null'" ]; then
                            echo "$val"
                            return 0
                          fi
                        done
                        echo "no_name"
                      }

                      # Order: git spec tag (manual input) -> git tag -> branch -> no_name.
                      BRANCH_OR_TAG="$(pick_first "$GIT_SPEC_TAG" "$GIT_TAG" "$CLEAN_BRANCH")"

                      BUILD_REF="${BRANCH_OR_TAG}"
                      IMAGE_TAG="${SERVICE_NAME}-${BUILD_REF}.b<+pipeline.sequenceId>"

                      echo "Generated IMAGE_TAG: $IMAGE_TAG"
                      echo "Generated BUILD_REF: $BUILD_REF"
                      echo "IMAGE_TAG_FOR_COPY=$IMAGE_TAG"

                      export IMAGE_TAG="$IMAGE_TAG"
                      export BUILD_REF="$BUILD_REF"

    # -------------------- STAGE 2: BUILD & TEST (CS / PY) --------------------
    - stage:
        name: build-and-test
        identifier: build_and_test
        type: CI
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.SERVICE_NAME> != "All"
        delegateSelectors:
          - harness-docker-delegate-demoskills        
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              connectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: build-and-test-cs
                  identifier: Build_Test_CS
                  when:
                    stageStatus: Success
                    condition: ((<+pipeline.variables.SERVICE_NAME> == "EmployeeAPI") || (<+pipeline.variables.SERVICE_NAME> == "PayAPI") || (<+pipeline.variables.SERVICE_NAME> == "TaxCalculatorAPI")) && (<+pipeline.variables.PERFORM_TESTS> == "Yes")
                  spec:
                    shell: Sh
                    image: mcr.microsoft.com/dotnet/sdk:8.0
                    envVariables:
                      ASPNETCORE_ENVIRONMENT: <+pipeline.variables.TARGET_ENV>
                    command: |
                      SERVICE_NAME="<+pipeline.variables.SERVICE_NAME>"
                      cd "apis/${SERVICE_NAME}"
                      dotnet restore
                      dotnet build --configuration Release
                      dotnet test

              - step:
                  type: Run
                  name: build-and-test-python
                  identifier: Build_Test_PY
                  when:
                    stageStatus: Success
                    condition: ((<+pipeline.variables.SERVICE_NAME> == "CompanyAPI") || (<+pipeline.variables.SERVICE_NAME> == "ReportAPI")) && (<+pipeline.variables.PERFORM_TESTS> == "Yes")
                  spec:
                    shell: Sh
                    image: python:3.12-slim
                    envVariables:
                      ASPNETCORE_ENVIRONMENT: <+pipeline.variables.TARGET_ENV>
                    command: |
                      SERVICE_NAME="<+pipeline.variables.SERVICE_NAME>"
                      cd "apis/${SERVICE_NAME}"
                      export PYTHONPATH="$PWD"
                      python -m pip install --no-cache-dir -r requirements.txt
                      python -m pytest -vv

    # -------------------- STAGE 3: DOCKER BUILD & PUSH --------------------
    - stage:
        name: docker-build-and-push
        identifier: docker_build_and_push
        type: CI
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.SERVICE_NAME> != "All"
        delegateSelectors:
          - harness-docker-delegate-demoskills
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              connectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: aws-docker-login-step
                  identifier: dsecrloginstep
                  spec:
                    shell: Sh
                    privileged: true
                    command: |-
                      echo "Logging into ECR..."

                      aws ecr get-login-password --region $AWS_REGION \
                        | docker login \
                              --username AWS \
                              --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
                    envVariables:
                      AWS_ACCOUNT_ID: <+secrets.getValue("proj-ds-aws-account-id")>
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("proj-ds-aws-access-key-id")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("proj-ds-aws-secret-access-key")>
                      AWS_REGION: <+secrets.getValue("proj-ds-aws-region")>

              - step:
                  type: Run
                  name: build-and-push-image
                  identifier: Build_And_Push_Image
                  spec:
                    shell: Sh
                    privileged: true
                    command: |-
                      set -e

                      SERVICE_NAME="<+pipeline.variables.SERVICE_NAME>"
                      IMAGE_TAG="<+pipeline.stages.setup.spec.execution.steps.GENERATE_IMAGE_NAME.output.outputVariables.IMAGE_TAG>"

                      echo "Building Docker image demo-image:$IMAGE_TAG"

                      if [ "$SERVICE_NAME" = "Dashboard" ]; then
                        docker build \
                          -t demo-image:$IMAGE_TAG \
                          -f dashboard/Dockerfile \
                          dashboard
                      else
                        docker build \
                          -t demo-image:$IMAGE_TAG \
                          -f apis/$SERVICE_NAME/Dockerfile \
                          apis/$SERVICE_NAME
                      fi

                      IMAGE_LOCAL="demo-image:$IMAGE_TAG"
                      ECR_REPO="demoskills"
                      FULL_TAG="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG"

                      echo "Tagging image..."
                      docker tag "$IMAGE_LOCAL" "$FULL_TAG"

                      echo "Pushing image to ECR..."
                      docker push "$FULL_TAG"

                      echo "Pushed image:"
                      echo "  $FULL_TAG"
                    envVariables:
                      AWS_ACCOUNT_ID: <+secrets.getValue("proj-ds-aws-account-id")>
                      AWS_REGION: <+secrets.getValue("proj-ds-aws-region")>

    # -------------------- STAGE 4: POST (optional) --------------------
    - stage:
        name: post
        identifier: post
        type: CI
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.SERVICE_NAME> != "All"
        delegateSelectors:
          - harness-docker-delegate-demoskills
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              connectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: log-image-tag
                  identifier: Log_Image_Tag
                  spec:
                    shell: Sh
                    command: |-
                      IMAGE_TAG="<+pipeline.stages.setup.spec.execution.steps.GENERATE_IMAGE_NAME.output.outputVariables.IMAGE_TAG>"
                      BUILD_REF="<+pipeline.stages.setup.spec.execution.steps.GENERATE_IMAGE_NAME.output.outputVariables.BUILD_REF>"
                      printf '\033[32m------------------------------------------------------------\033[0m\n'
                      printf '\033[32m>>> Final IMAGE_TAG (for deploy or copy): %s <<<\033[0m\n' "$IMAGE_TAG"
                      printf '\033[32m>>> Branch/Tag ref: %s <<<\033[0m\n' "$BUILD_REF"
                      printf '\033[32m------------------------------------------------------------\033[0m\n'

    # -------------------- STAGE 5: BUILD ALL (loop) --------------------
    - stage:
        name: build-all
        identifier: build_all
        type: CI
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.SERVICE_NAME> == "All"
        delegateSelectors:
          - harness-docker-delegate-demoskills
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              connectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: aws-docker-login
                  identifier: aws_docker_login_all
                  spec:
                    shell: Sh
                    privileged: true
                    envVariables:
                      AWS_ACCOUNT_ID: <+secrets.getValue("proj-ds-aws-account-id")>
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("proj-ds-aws-access-key-id")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("proj-ds-aws-secret-access-key")>
                      AWS_REGION: <+secrets.getValue("proj-ds-aws-region")>
                    command: |-
                      echo "Logging into ECR..."
                      aws ecr get-login-password --region $AWS_REGION \
                        | docker login \
                            --username AWS \
                            --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

              - step:
                  type: Run
                  name: build-all-services
                  identifier: build_all_services
                  spec:
                    shell: Sh
                    privileged: true
                    envVariables:
                      AWS_ACCOUNT_ID: <+secrets.getValue("proj-ds-aws-account-id")>
                      AWS_REGION: <+secrets.getValue("proj-ds-aws-region")>
                      TARGET_ENV: <+pipeline.variables.TARGET_ENV>
                      PERFORM_TESTS: <+pipeline.variables.PERFORM_TESTS>
                    command: |-
                      set -eu

                      SERVICES="EmployeeAPI CompanyAPI TaxCalculatorAPI PayAPI ReportAPI Dashboard"
                      BRANCH="<+codebase.branch>"
                      GIT_TAG="<+codebase.gitTag>"
                      SPEC_TAG="<+pipeline.properties.ci.codebase.build.spec.tag>"

                      pick_first() {
                        for val in "$@"; do
                          if [ -n "$val" ] && [ "$val" != "null" ] && [ "$val" != "'null'" ]; then
                            echo "$val"
                            return 0
                          fi
                        done
                        echo "no_name"
                      }

                      SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-')
                      CLEAN_BRANCH=$(echo "$SAFE_BRANCH" | sed 's/^feature-//')
                      BUILD_REF="$(pick_first "$SPEC_TAG" "$GIT_TAG" "$CLEAN_BRANCH")"

                      echo "Using BUILD_REF=$BUILD_REF TARGET_ENV=$TARGET_ENV PERFORM_TESTS=$PERFORM_TESTS"
                      IMAGE_TAGS_FILE=/tmp/image_tags.txt
                      IMAGE_TAGS_ONLY=/tmp/image_tags_only.txt
                      IMAGE_TAGS_SHORT=/tmp/image_tags_short.txt
                      : > "$IMAGE_TAGS_FILE"
                      : > "$IMAGE_TAGS_ONLY"
                      : > "$IMAGE_TAGS_SHORT"

                      for SERVICE_NAME in $SERVICES; do
                        echo "---- Building $SERVICE_NAME ----"
                        IMAGE_TAG="${SERVICE_NAME}-${BUILD_REF}.b<+pipeline.sequenceId>"

                        if [ "$PERFORM_TESTS" = "Yes" ]; then
                          if [ "$SERVICE_NAME" = "CompanyAPI" ] || [ "$SERVICE_NAME" = "ReportAPI" ]; then
                            docker run --rm -v "$PWD":/work -w /work/apis/$SERVICE_NAME python:3.12-slim sh -c "
                              set -e
                              export PYTHONPATH=/work/apis/$SERVICE_NAME
                              python -m pip install --no-cache-dir -r requirements.txt
                              python -m pytest -vv
                            "
                          elif [ "$SERVICE_NAME" != "Dashboard" ]; then
                            docker run --rm -v "$PWD":/work -w /work/apis/$SERVICE_NAME mcr.microsoft.com/dotnet/sdk:8.0 sh -c "
                              set -e
                              dotnet restore
                              dotnet build --configuration Release
                              dotnet test
                            "
                          fi
                        fi

                        if [ "$SERVICE_NAME" = "Dashboard" ]; then
                          docker build -t demo-image:$IMAGE_TAG -f dashboard/Dockerfile dashboard
                        else
                          docker build -t demo-image:$IMAGE_TAG -f apis/$SERVICE_NAME/Dockerfile apis/$SERVICE_NAME
                        fi

                        FULL_TAG="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/demoskills:$IMAGE_TAG"
                        docker tag demo-image:$IMAGE_TAG "$FULL_TAG"
                        docker push "$FULL_TAG"

                        echo "$SERVICE_NAME -> $FULL_TAG" | tee -a "$IMAGE_TAGS_FILE"
                        echo "$FULL_TAG" >> "$IMAGE_TAGS_ONLY"
                        echo "$IMAGE_TAG" >> "$IMAGE_TAGS_SHORT"
                      done

                      printf '\033[32m------------------------------------------------------------\033[0m\n'
                      printf '\033[32mBuilt & pushed (service -> tag):\033[0m\n'
                      cat "$IMAGE_TAGS_FILE"
                      printf '\033[32mShort tags (copy/paste):\033[0m\n'
                      echo
                      cat "$IMAGE_TAGS_SHORT"
                      echo
                      printf '\033[33;7m--------------- COPY BUILD TAGS ---------------\033[0m\n'
                      echo
                      tr '\n' ' ' < "$IMAGE_TAGS_SHORT"
                      echo
                      echo
                      printf '\033[33;7m--------------- ---------------- ---------------\033[0m\n'
                      echo
                      printf '\033[32mFull tags (copy/paste):\033[0m\n'
                      cat "$IMAGE_TAGS_ONLY"
                      printf '\033[32m------------------------------------------------------------\033[0m\n'
