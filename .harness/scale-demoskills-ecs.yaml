# CI-style utility pipeline to scale ECS services up/down using the docker delegate.
# IMPORTANT: run locally > sudo -E ./harness-docker-runner-linux-amd64 server (keep running in background).
# ALSO: CI-LITE-ENGINE is NOT needed on local machine. MUST install the Harness exe.
pipeline:
  name: DS - ECS Scale Services
  identifier: DS_ECS_Scale_Services
  projectIdentifier: demo_skills_project
  orgIdentifier: default
  description: Used to scale the desired count. Used to reduce tasks to 0 on none usage days. Cost Savings.
    ECS_SERVICES_CSV values saved in project variables, comma delim.
  tags: {}

  variables:
    - name: DESIRED_COUNT
      type: Number
      value: <+input>
      description: Desired count to set on services (e.g., 0 to pause, 1 to resume).
      required: true
    - name: ECS_CLUSTER
      type: String
      value: demoskills-001-ecs
      description: Target ECS cluster.
    - name: SERVICE_NAMES
      type: String
      value: <+input>.default(employeeapi,companyapi,payapi,taxcalculatorapi,reportapi)
      description: Comma-separated short service names (e.g., employeeapi,companyapi,payapi,taxcalculatorapi,reportapi).

  stages:
    - stage:
        name: scale-services
        identifier: scale_services
        type: CI
        delegateSelectors:
          - harness-docker-delegate-demoskills 
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              connectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: Scale ECS Services
                  identifier: scale_ecs_services
                  spec:
                    shell: Sh
                    image: amazon/aws-cli:2.23.4
                    envVariables:
                      AWS_ACCOUNT_ID: <+secrets.getValue("proj-ds-aws-account-id")>
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("proj-ds-aws-access-key-id")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("proj-ds-aws-secret-access-key")>
                      AWS_REGION: <+secrets.getValue("proj-ds-aws-region")>
                    command: |-
                      set -euo pipefail

                      CLUSTER="<+pipeline.variables.ECS_CLUSTER>"
                      DESIRED_RAW="<+pipeline.variables.DESIRED_COUNT>"
                      SERVICE_NAMES_RAW="<+pipeline.variables.SERVICE_NAMES>"

                      DESIRED="${DESIRED_RAW%.*}"
                      if [ -z "$DESIRED" ]; then
                        echo "Invalid desired count: '$DESIRED_RAW'"
                        exit 1
                      fi

                      echo "SERVICE_NAMES raw: '${SERVICE_NAMES_RAW}'"

                      if [ -z "$SERVICE_NAMES_RAW" ] || [ "$SERVICE_NAMES_RAW" = "null" ] || [ "$SERVICE_NAMES_RAW" = "\"\"" ]; then
                        echo "No service names provided."
                        exit 1
                      fi

                      IFS=',' read -r -a SERVICE_NAMES <<< "$SERVICE_NAMES_RAW"
                      if [ "${#SERVICE_NAMES[@]}" -eq 0 ]; then
                        echo "No service names provided."
                        exit 1
                      fi

                      resolve_service() {
                        local key="$1"
                        if [ -z "$key" ]; then
                          echo ""
                          return
                        fi
                        local default="${key}-svc"
                        local found=""
                        found=$(aws ecs describe-services \
                          --cluster "$CLUSTER" \
                          --services "$default" \
                          --query 'services[0].serviceName' \
                          --output text 2>/dev/null)
                        if [ "$found" = "None" ] || [ -z "$found" ]; then
                          found=$(aws ecs list-services \
                            --cluster "$CLUSTER" \
                            --query 'serviceArns[]' \
                            --output text \
                            | tr '\t' '\n' \
                            | grep "$key" \
                            | head -n 1 \
                            | awk -F'/' '{print $NF}')
                        fi
                        echo "$found"
                      }

                      echo "Scaling services on cluster $CLUSTER to desired count: $DESIRED"
                      for name in "${SERVICE_NAMES[@]}"; do
                        svc_key="$(echo "$name" | xargs | tr '[:upper:]' '[:lower:]')"
                        [ -z "$svc_key" ] && continue
                        svc_name=$(resolve_service "$svc_key")
                        if [ -z "$svc_name" ]; then
                          echo "  Skipping $svc_key: not found"
                          continue
                        fi
                        echo "Updating $svc_name ..."
                        aws ecs update-service \
                          --cluster "$CLUSTER" \
                          --service "$svc_name" \
                          --desired-count "$DESIRED" >/tmp/scale-${svc_name}.json
                        echo "  OK"
                      done

                      echo "Done. Updated services:"
                      printf '  - %s\n' "${SERVICE_NAMES[@]}"
                      printf '\033[32m%s\033[0m\n' "Scaling complete."
                      printf '\033[32m------------------------------------------------------------\033[0m\n'
