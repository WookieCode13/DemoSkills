# Simple scratch pipeline for testing printf/echo behavior in Harness.
pipeline:
  name: Simple-Test-Stage-Ideas
  identifier: SimpleTestStageIdeas
  projectIdentifier: demo_skills_project
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: simple-test-idea-stage
        identifier: simpletestideastage
        type: CI
        delegateSelectors:
          - harness-docker-delegate-demoskills
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              connectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: printf-and-echo-test
                  identifier: printf_and_echo_test
                  spec:
                    shell: Sh
                    image: alpine:3.19
                    command: |
                      SERVICE_NAME="EmployeeAPI"
                      BUILD_REF="feature-employee-to-schema"
                      IMAGE_TAG="${SERVICE_NAME}-${BUILD_REF}.b1234"
                      IMAGE_TAGS_SHORT="/tmp/image_tags_short.txt"
                      IMAGE_TAGS_ONLY="/tmp/image_tags_only.txt"

                      printf '%s\n' "$IMAGE_TAG" > "$IMAGE_TAGS_SHORT"
                      printf '%s\n' "123456789012.dkr.ecr.us-east-1.amazonaws.com/demoskills:$IMAGE_TAG" > "$IMAGE_TAGS_ONLY"

                      printf '\033[32m------------------------------------------------------------\033[0m\n'
                      printf '\033[32mSimple Harness printf/echo test\033[0m\n'
                      printf 'SERVICE_NAME=%s\n' "$SERVICE_NAME"
                      printf 'BUILD_REF=%s\n' "$BUILD_REF"
                      printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
                      printf '\033[32mShort tags (copy/paste):\033[0m\n'
                      cat "$IMAGE_TAGS_SHORT"
                      printf '\033[33mShort tags (single line):\033[0m\n'
                      tr '\n' ' ' < "$IMAGE_TAGS_SHORT"
                      echo
                      printf '\033[32mFull tags (copy/paste):\033[0m\n'
                      cat "$IMAGE_TAGS_ONLY"
                      printf '\033[32m------------------------------------------------------------\033[0m\n'

