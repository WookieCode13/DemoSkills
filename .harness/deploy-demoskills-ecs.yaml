# CI-style deploy pipeline to roll out ECR images to ECS using the docker delegate.
# Assumes:
# - ECR repo: demoskills
# - ECS cluster: demoskills-001-ecs
# - Service/task/container names follow the pattern "<service>-svc", "<service>-task", "<service>"
#   with service lower-cased (override via the *_OVERRIDE vars if different).
pipeline:
  name: DS - Deploy to ECS Delegate
  identifier: DS_Deploy_to_ECS_Delegate
  projectIdentifier: demo_skills_project
  orgIdentifier: default
  tags: {}

  variables:
    - name: IMAGE_TAGS
      type: String
      value: <+input>
      description: Space- or comma-separated list of tags; each tag must start with service prefix (EmployeeAPI-*, CompanyAPI-*, etc).
      required: true
    - name: TARGET_ENV
      type: String
      value: <+input>.allowedValues(Development,Production)
      description: Target environment (drives ASPNETCORE_ENVIRONMENT and connection string selection)
      required: true
    - name: ECS_CLUSTER
      type: String
      value: demoskills-001-ecs
      description: Target ECS cluster.
    - name: DESIRED_COUNT
      type: Number
      value: 1
      description: Desired task count after deploy.
    - name: WAIT_FOR_STABLE
      type: String
      value: <+input>.allowedValues("true","false")
      default: "true"
      description: Set to false to skip ecs wait services-stable (can be slow).

  stages:
    - stage:
        name: deploy-to-ecs
        identifier: deploy_to_ecs
        type: CI
        delegateSelectors:
          - harness-docker-delegate-demoskills
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              connectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy Image to ECS
                  identifier: deploy_image_to_ecs
                  spec:
                    shell: Sh
                    image: amazon/aws-cli:2.23.4
                    envVariables:
                      AWS_ACCOUNT_ID: <+secrets.getValue("proj-ds-aws-account-id")>
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("proj-ds-aws-access-key-id")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("proj-ds-aws-secret-access-key")>
                      AWS_REGION: <+secrets.getValue("proj-ds-aws-region")>
                      TARGET_ENV: <+pipeline.variables.TARGET_ENV>
                      DB_CONN_DEV: <+secrets.getValue("db_conn_dev")>
                      DB_CONN_PROD: <+secrets.getValue("db_conn_prod")>
                    command: |-
                      set -euo pipefail

                      # Install jq for task definition mutation.
                      yum install -y jq >/dev/null

                      MULTI_IMAGE_TAGS_RAW="<+pipeline.variables.IMAGE_TAGS>"
                      CLUSTER="<+pipeline.variables.ECS_CLUSTER>"
                      TARGET_ENV="${TARGET_ENV:-Development}"
                      WAIT_FOR_STABLE_RAW="<+pipeline.variables.WAIT_FOR_STABLE>"
                      DESIRED_COUNT_RAW="<+pipeline.variables.DESIRED_COUNT>"
                      ECR_REPO="demoskills"
                      DB_CONN=""

                      # Build list of tags to process (required).
                      IMAGE_TAG_LIST=$(echo "$MULTI_IMAGE_TAGS_RAW" | tr ',\n' ' ' | tr -s ' ')
                      if [ -z "$IMAGE_TAG_LIST" ] || [ "$IMAGE_TAG_LIST" = "null" ] || [ "$IMAGE_TAG_LIST" = "'null'" ]; then
                        echo "ERROR: IMAGE_TAGS is required (space or comma separated)."
                        exit 1
                      fi

                      SERVICES="EmployeeAPI CompanyAPI TaxCalculatorAPI PayAPI ReportAPI Dashboard"
                      DEPLOYED=""
                      SKIPPED=""

                      # Function to deploy one image tag to a specific service.
                      deploy_one() {
                        local TAG="$1"
                        local SERVICE_NAME="$2"

                        if [ "$TARGET_ENV" = "Production" ]; then
                          DB_CONN="${DB_CONN_PROD:-}"
                        else
                          DB_CONN="${DB_CONN_DEV:-}"
                        fi

                        if [ -z "$DB_CONN" ]; then
                          echo "ERROR: Connection string not provided for TARGET_ENV=$TARGET_ENV. Set db_conn_dev/db_conn_prod secrets."
                          exit 1
                        fi

                        SERVICE_KEY=$(echo "$SERVICE_NAME" | tr '[:upper:]' '[:lower:]')
                        ECS_SERVICE="${SERVICE_KEY}-svc"
                        ECS_TASK_FAMILY="${SERVICE_KEY}-task"
                        CONTAINER_NAME="${SERVICE_KEY}"

                        IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$TAG"

                        echo "Deploying $IMAGE to service $ECS_SERVICE"
                        echo "Cluster: $CLUSTER"
                        echo "Task family: $ECS_TASK_FAMILY"
                        echo "Container: $CONTAINER_NAME"

                        # Coerce desired count to integer (Harness may send "1.0" for Number fields).
                        DESIRED_COUNT="${DESIRED_COUNT_RAW%.*}"
                        if [ -z "$DESIRED_COUNT" ]; then
                          DESIRED_COUNT=1
                        fi

                        # Derive BUILD_REF from TAG if not provided (expects SERVICE-ref.bNN format).
                        local BUILD_REF_LOCAL="$BUILD_REF"
                        if [ -z "${BUILD_REF_LOCAL:-}" ] || [ "${BUILD_REF_LOCAL}" = "null" ] || [ "${BUILD_REF_LOCAL}" = "'null'" ]; then
                          BUILD_REF_LOCAL=$(echo "$TAG" \
                            | sed "s/^${SERVICE_NAME}-//" \
                            | sed 's/\.b[0-9]\+$//')
                          echo "Derived BUILD_REF from TAG: ${BUILD_REF_LOCAL}"
                        fi
                        if [ -z "${BUILD_REF_LOCAL:-}" ] || [ "${BUILD_REF_LOCAL}" = "null" ] || [ "${BUILD_REF_LOCAL}" = "'null'" ]; then
                          BUILD_REF_LOCAL="manual"
                          echo "BUILD_REF not provided; defaulting to ${BUILD_REF_LOCAL}"
                        fi

                        echo "Desired count: $DESIRED_COUNT"

                        CURRENT_TASK_DEF_ARN=$(
                          aws ecs describe-services \
                            --cluster "$CLUSTER" \
                            --services "$ECS_SERVICE" \
                            --query 'services[0].taskDefinition' \
                            --output text
                        )

                        # If the default naming didn't match, try to autodiscover a service containing the key.
                        if [ -z "$CURRENT_TASK_DEF_ARN" ] || [ "$CURRENT_TASK_DEF_ARN" = "None" ]; then
                          echo "Service $ECS_SERVICE not found; attempting discovery for key '$SERVICE_KEY'..."
                          DISCOVERED_SERVICE=$(
                            aws ecs list-services \
                              --cluster "$CLUSTER" \
                              --query 'serviceArns[]' \
                              --output text \
                              | tr '\t' '\n' \
                              | grep "$SERVICE_KEY" \
                              | head -n 1
                          )

                          if [ -n "$DISCOVERED_SERVICE" ]; then
                            ECS_SERVICE=$(echo "$DISCOVERED_SERVICE" | awk -F'/' '{print $NF}')
                            echo "Using discovered ECS service: $ECS_SERVICE"
                            CURRENT_TASK_DEF_ARN=$(
                              aws ecs describe-services \
                                --cluster "$CLUSTER" \
                                --services "$ECS_SERVICE" \
                                --query 'services[0].taskDefinition' \
                                --output text
                            )
                          fi
                        fi

                        if [ -z "$CURRENT_TASK_DEF_ARN" ] || [ "$CURRENT_TASK_DEF_ARN" = "None" ]; then
                          echo "ERROR: Service $ECS_SERVICE not found in cluster $CLUSTER. Update the service name or ECS mappings."
                          exit 1
                        fi

                        aws ecs describe-task-definition \
                          --task-definition "$CURRENT_TASK_DEF_ARN" \
                          --query 'taskDefinition' > /tmp/taskdef.json

                        # Remove read-only fields and swap the image for the target container.
                        jq \
                          --arg image "$IMAGE" \
                          --arg container "$CONTAINER_NAME" \
                          --arg build_ref "$BUILD_REF_LOCAL" \
                          'del(.status, .revision, .taskDefinitionArn, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .tags)
                            | .family = "'$ECS_TASK_FAMILY'"
                            | .containerDefinitions = [
                                .containerDefinitions[]
                                | if .name == $container then
                                    .image = $image
                                    | .environment = (
                                        (.environment // [])
                                        | map(select(.name != "BUILD_BRANCH" and .name != "BUILD_REF" and .name != "ASPNETCORE_ENVIRONMENT" and .name != "ConnectionStrings__Default"))
                                        + [
                                            { "name": "BUILD_BRANCH", "value": $build_ref },
                                            { "name": "BUILD_REF", "value": $build_ref },
                                            { "name": "ASPNETCORE_ENVIRONMENT", "value": "'$TARGET_ENV'" },
                                            { "name": "ConnectionStrings__Default", "value": "'$DB_CONN'" }
                                          ]
                                      )
                                  else . end
                              ]' \
                          /tmp/taskdef.json > /tmp/new-taskdef.json

                        NEW_TASK_DEF_ARN=$(
                          aws ecs register-task-definition \
                            --cli-input-json file:///tmp/new-taskdef.json \
                            --query 'taskDefinition.taskDefinitionArn' \
                            --output text
                        )

                        echo "Registered new task definition: $NEW_TASK_DEF_ARN"

                        aws ecs update-service \
                          --cluster "$CLUSTER" \
                          --service "$ECS_SERVICE" \
                          --task-definition "$NEW_TASK_DEF_ARN" \
                          --desired-count "$DESIRED_COUNT"

                        if echo "${WAIT_FOR_STABLE_RAW:-true}" | tr '[:upper:]' '[:lower:]' | grep -q '^true'; then
                          echo "Waiting for service to stabilize..."
                          aws ecs wait services-stable --cluster "$CLUSTER" --services "$ECS_SERVICE"
                        else
                          echo "Skipping ecs wait (WAIT_FOR_STABLE=$WAIT_FOR_STABLE_RAW)."
                        fi

                        printf '\033[32m%s\033[0m\n' "Deployment complete. Service $ECS_SERVICE is running image $IMAGE"
                        printf '\033[32m------------------------------------------------------------\033[0m\n'
                      }

                      # Loop services, find matching tag with prefix "<service>-".
                      for SERVICE in $SERVICES; do
                        TAG_MATCH=""
                        for TAG in $IMAGE_TAG_LIST; do
                          case "$TAG" in
                            ${SERVICE}-*) TAG_MATCH="$TAG"; break;;
                          esac
                        done

                        if [ -z "$TAG_MATCH" ]; then
                          echo "Skipping $SERVICE: no matching tag prefix found."
                          SKIPPED="$SKIPPED $SERVICE"
                          continue
                        fi

                        echo "--------- Deploying $SERVICE with TAG=$TAG_MATCH ---------"
                        deploy_one "$TAG_MATCH" "$SERVICE"
                        DEPLOYED="$DEPLOYED $SERVICE:$TAG_MATCH"
                      done

                      printf '\033[32m------------------------------------------------------------\033[0m\n'
                      printf '\033[32mDeploy summary:\033[0m\n'
                      printf 'Deployed:%s\n' "${DEPLOYED:- none}"
                      printf 'Skipped (no tag):%s\n' "${SKIPPED:- none}"
                      printf '\033[32m------------------------------------------------------------\033[0m\n'
